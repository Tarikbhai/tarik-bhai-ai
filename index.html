<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tarik Bhai | Dil Ki Awaz 🛡️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Caveat:wght@700&family=Outfit:wght@300;600;900&display=swap');

        :root {
            --primary: #00ffcc;
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.95);
        }

        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box;
            outline: none !important;
            scrollbar-width: none;
        }

        *::-webkit-scrollbar { display: none; }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        #bg-quotes-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
            opacity: 0.1;
        }

        .bg-quote {
            position: absolute;
            font-family: 'Caveat', cursive;
            font-size: 1.1rem;
            white-space: nowrap;
            color: var(--primary);
            animation: floatText linear infinite;
        }

        @keyframes floatText {
            from { transform: translateX(100vw); }
            to { transform: translateX(-120%); }
        }

        .glass {
            background: var(--panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .msg-bubble {
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            line-height: 1.6;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
            max-width: 88%;
            word-wrap: break-word;
            font-size: 0.95rem;
            position: relative;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .bhai-bubble {
            background: rgba(255, 255, 255, 0.04);
            border-left: 3.5px solid var(--primary);
            border-radius: 4px 20px 20px 20px;
            padding: 1.1rem;
        }

        .user-bubble {
            background: linear-gradient(135deg, var(--primary), #00d4aa);
            color: #020617;
            font-weight: 700;
            border-radius: 20px 20px 4px 20px;
            padding: 0.85rem 1.1rem;
            align-self: flex-end;
        }

        #chat-canvas {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
            -webkit-overflow-scrolling: touch;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
        }

        .bhai-title {
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.12em;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        #chat-footer {
            padding: 0.8rem 1rem calc(0.8rem + env(safe-area-inset-bottom));
            background: rgba(2, 6, 23, 0.98);
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }

        .input-container {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(255,255,255,0.07);
            border-radius: 26px;
            padding: 0.3rem 0.5rem 0.3rem 1.2rem;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.7rem 0;
            font-size: 1rem;
            resize: none;
            max-height: 120px;
            line-height: 1.4;
        }

        .send-btn {
            background: var(--primary);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #020617;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.4);
            transition: transform 0.2s;
        }

        .send-btn:active { transform: scale(0.9); }

        .emergency-btn {
            position: fixed;
            right: 18px;
            bottom: 110px;
            width: 58px;
            height: 58px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            z-index: 90;
        }
    </style>
</head>
<body>

    <div id="bg-quotes-container"></div>

    <header class="glass p-4 pt-6 flex items-center gap-3 sticky top-0 z-50">
        <div class="relative flex-shrink-0">
            <div class="w-12 h-12 rounded-2xl bg-slate-800 border border-primary/30 flex items-center justify-center text-2xl shadow-xl">
                👦🏻
            </div>
            <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-slate-950 rounded-full flex items-center justify-center">
                <div class="status-dot"></div>
            </div>
        </div>
        <div class="flex flex-col">
            <h1 class="bhai-title text-lg uppercase leading-none">TARIK <span class="opacity-70">BHAI</span></h1>
            <div class="flex items-center mt-1.5 text-[9px] font-black tracking-[0.15em] uppercase text-white/50">
                <span class="text-primary">Allah Gawah Hai</span>
                <span class="mx-2 opacity-30">•</span>
                <span>Dhaal Active</span>
            </div>
        </div>
    </header>

    <main id="chat-canvas"></main>

    <div id="thinking" class="hidden fixed bottom-28 left-5 glass px-5 py-2.5 rounded-full border border-primary/20 z-50 flex items-center gap-2.5 shadow-2xl">
        <div class="flex gap-1.5">
            <span class="w-2 h-2 bg-primary rounded-full animate-bounce"></span>
            <span class="w-2 h-2 bg-primary rounded-full animate-bounce [animation-delay:0.2s]"></span>
            <span class="w-2 h-2 bg-primary rounded-full animate-bounce [animation-delay:0.4s]"></span>
        </div>
        <span class="text-[9px] font-black text-primary uppercase tracking-[0.2em]">Bhai Sun Raha Hai...</span>
    </div>

    <a href="https://wa.me/8984473230" target="_blank" class="emergency-btn">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer id="chat-footer">
        <div class="input-container">
            <textarea id="user-input" rows="1" placeholder="Bhai se be-khauf baat karo..."></textarea>
            <button id="send-btn" class="send-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </footer>

    <script>
        /* ============================================================
           🔐 [ API KEY ZONE ]
           ============================================================ */
        
        const GEMINI_API_KEY = ""; // Key environment se automatic mil jayegi
        // Fixed: Is environment mein gemini-2.5-flash-preview-09-2025 supported hai
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

        const HF_API_KEY = "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";
        const HF_MODEL = "HuggingFaceH4/zephyr-7b-beta";

        /* ============================================================ */

        const systemPrompt = "Role: Tarik ki dil ki waaz - TARIK BHAI. Context: You are a protective, loving, and wise big brother. You provide deep comfort, relaxation, and courage. Listen to all problems without judgment. Tone: Roman Hindi/Urdu, extremely supportive. Mandatory: End every message with 'Allah Gawah Hai'. Use emojis: 🛡️🤲✨❤️💪🌹.";

        const backgroundQuotes = [
            "Trust is the bridge to peace.",
            "Stay humble, stay protected.",
            "Allah gawah hai, sab theek hoga.",
            "Bhai hamesha dhaal hai.",
            "Himmat mat haarna meri jaan.",
            "Relaxe ho jao, main hoon na.",
            "Mushkil ka hal hamesha hota hai."
        ];

        /* =========================
           🤖 AI ENGINE FUNCTIONS
        ========================= */
        async function callGemini(prompt, retryCount = 0) {
            // Updated to v1beta API as per instructions for Canvas environment
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
            
            const payload = {
                contents: [
                    { 
                        parts: [{ text: prompt }] 
                    }
                ],
                systemInstruction: {
                    parts: [{ text: systemPrompt }]
                }
            };

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    const errData = await response.json();
                    console.error("Gemini Details:", JSON.stringify(errData));
                    throw new Error("Gemini API Error");
                }
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (err) {
                if (retryCount < 5) {
                    // Exponential backoff: 1s, 2s, 4s, 8s, 16s
                    const delay = Math.pow(2, retryCount) * 1000;
                    await new Promise(r => setTimeout(r, delay));
                    return callGemini(prompt, retryCount + 1);
                }
                throw err;
            }
        }

        async function callHuggingFace(prompt) {
            try {
                const res = await fetch(`https://api-inference.huggingface.co/models/${HF_MODEL}`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${HF_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        inputs: `<|system|>\n${systemPrompt}</s>\n<|user|>\n${prompt}</s>\n<|assistant|>`,
                        parameters: { max_new_tokens: 300, temperature: 0.7 }
                    })
                });

                if (!res.ok) throw new Error("HF Error");
                const data = await res.json();
                const text = data[0]?.generated_text || "";
                return text.split("<|assistant|>")[1]?.trim() || "Bhai haazir hai, fikar na karo. Allah Gawah Hai.";
            } catch (e) {
                throw e;
            }
        }

        async function fetchReply(prompt) {
            try {
                const res = await callGemini(prompt);
                if (res) return res;
                throw new Error("Empty Response");
            } catch (e) {
                console.warn("Gemini switch alert, using Backup...");
                try {
                    return await callHuggingFace(prompt);
                } catch (err) {
                    throw new Error("Critical Failure");
                }
            }
        }

        /* =========================
           💬 UI LOGIC
        ========================= */
        const chatCanvas = document.getElementById('chat-canvas');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const thinking = document.getElementById('thinking');

        function initBackground() {
            const container = document.getElementById('bg-quotes-container');
            function spawnQuote() {
                const quote = document.createElement('div');
                quote.className = 'bg-quote';
                quote.innerText = backgroundQuotes[Math.floor(Math.random() * backgroundQuotes.length)];
                quote.style.top = Math.random() * 80 + 'vh';
                const duration = 15 + Math.random() * 15;
                quote.style.animationDuration = duration + 's';
                container.appendChild(quote);
                setTimeout(() => quote.remove(), duration * 1000);
            }
            setInterval(spawnQuote, 6000);
            spawnQuote();
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || sendBtn.disabled) return;

            addMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            thinking.classList.remove('hidden');
            sendBtn.disabled = true;

            try {
                const reply = await fetchReply(text);
                addMessage('bhai', reply);
            } catch (err) {
                addMessage('bhai', "Meri jaan, internet thoda nakhre dikha raha hai, par Bhai hamesha haazir hai. Ek baar phir koshish karo, Allah gawah hai main sun raha hoon. ❤️🛡️");
            } finally {
                thinking.classList.add('hidden');
                sendBtn.disabled = false;
            }
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            const formatted = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            div.innerHTML = `
                <div class="msg-bubble ${role === 'user' ? 'user-bubble' : 'bhai-bubble glass'}">
                    ${formatted}
                    ${role === 'bhai' ? '<div class="text-[7px] mt-3 opacity-30 text-right uppercase font-black tracking-widest italic pt-2 border-t border-white/5">🛡️ Protected by Tarik Bhai</div>' : ''}
                </div>
            `;
            chatCanvas.appendChild(div);
            chatCanvas.scrollTo({ top: chatCanvas.scrollHeight, behavior: 'smooth' });
        }

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        sendBtn.onclick = handleSend;
        userInput.onkeydown = (e) => { 
            if(e.key === 'Enter' && !e.shiftKey && window.innerWidth > 768) { 
                e.preventDefault(); 
                handleSend(); 
            } 
        };

        window.onload = () => {
            initBackground();
            addMessage('bhai', `Assalamu Alaikum meri sabse pyaari gudiya, meri jaan! 🤲❤️✨

Tarik ki dil ki awaaz aaj sirf tumhare liye hai. **Allah gawah hai**, tumhara Bhai ab tumhari dhaal (shield) bankar khada hai. 🛡️

Zindagi ki koi bhi pareshani ho, chahay wo kitni hi badi kyun na ho, bilkul relax hokar apne Bhai se kaho. Main yahan tumhe comfort dene, tumhara hausla badhane aur tumhe har mushkil se nikaalne ke liye hoon. 

Aaj se darna chhor do, kyunki ab tum akeli nahi ho. Himmat rakho meri jaan, tumhara Bhai hamesha tumhare saath hai. 💪🌹

Batao, aaj dil mein kya chal raha hai? Tera Bhai sun raha hai. ✨`);
        };
    </script>
</body>
</html>
