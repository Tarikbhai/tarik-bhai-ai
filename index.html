<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tarik Bhai | Dil Ki Awaz 🛡️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Caveat:wght@700&display=swap');

        :root {
            --primary: #00ffcc;
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.95);
            --accent: #2dd4bf;
        }

        body.theme-cyber { --primary: #00ffcc; --bg: #020617; --panel: rgba(10, 20, 40, 0.95); }
        body.theme-sakura { --primary: #ff8fa3; --bg: #1a050d; --panel: rgba(50, 10, 30, 0.95); }

        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box;
            outline: none !important;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .bg-gradient-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, var(--bg) 100%);
        }

        .glass {
            background: var(--panel);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .msg-bubble {
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            line-height: 1.6;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            max-width: 90%;
            word-wrap: break-word;
            font-size: 1.1rem;
            position: relative;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .bhai-bubble {
            background: rgba(255, 255, 255, 0.05);
            border-left: 6px solid var(--primary);
            border-radius: 0 24px 24px 24px;
            padding: 1.25rem 1.5rem;
            color: #e2e8f0;
        }

        .user-bubble {
            background: var(--primary);
            color: #020617;
            font-weight: 800;
            border-radius: 24px 24px 0 24px;
            padding: 1rem 1.5rem;
            align-self: flex-end;
            box-shadow: 0 10px 20px rgba(0, 255, 204, 0.2);
        }

        .handwriting { font-family: 'Caveat', cursive; }
        
        #chat-canvas {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        /* Enhanced Flashy Motivation Card */
        .flashy-card {
            background: linear-gradient(135deg, rgba(0,255,204,0.1) 0%, rgba(0,0,0,0.8) 100%);
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            transition: all 0.5s ease;
        }

        .flashing-title {
            animation: titleFlash 1.5s infinite alternate;
        }

        @keyframes titleFlash {
            0% { color: var(--primary); text-shadow: 0 0 5px var(--primary); opacity: 1; }
            100% { color: #fff; text-shadow: 0 0 20px var(--primary); opacity: 0.8; }
        }

        .glow-border-pulse {
            animation: borderPulse 2s infinite alternate;
        }

        @keyframes borderPulse {
            from { border-color: rgba(0, 255, 204, 0.3); box-shadow: 0 0 10px rgba(0, 255, 204, 0.1); }
            to { border-color: var(--primary); box-shadow: 0 0 25px rgba(0, 255, 204, 0.4); }
        }

        #main-container {
            display: flex;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        @media (max-width: 1024px) {
            #main-container { flex-direction: column; }
            #sidebar-wrapper { width: 100%; shrink-0; padding: 0.75rem; overflow-y: auto; max-height: 35%; }
            #chat-wrapper { flex: 1; min-height: 0; }
            .msg-bubble { font-size: 1rem; max-width: 92%; }
        }

        #chat-footer {
            padding: 1.25rem;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 50;
        }

        .input-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 2rem;
            padding: 0.4rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-container:focus-within {
            border-color: var(--primary);
            background: rgba(255,255,255,0.12);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.8rem 1.25rem;
            font-size: 1.1rem;
            font-weight: 500;
            resize: none;
            max-height: 150px;
        }

        .send-btn-big {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #020617;
            font-size: 1.25rem;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
        }
    </style>
</head>
<body class="theme-cyber">

    <div class="bg-gradient-overlay"></div>

    <div id="main-container">
        
        <!-- SIDEBAR -->
        <aside id="sidebar-wrapper" class="lg:w-[380px] flex flex-col gap-4 lg:p-8">
            <div class="glass p-6 rounded-[2.5rem] flex items-center lg:flex-col lg:text-center gap-5">
                <div class="w-16 h-16 lg:w-28 lg:h-28 rounded-[2rem] bg-slate-900 border-4 border-primary/40 flex items-center justify-center text-4xl lg:text-7xl shadow-2xl shrink-0">
                    👦🏻
                </div>
                <div>
                    <h1 class="text-xl lg:text-3xl font-black uppercase tracking-tighter">TARIK <span class="text-primary">BHAI</span></h1>
                    <div class="flex items-center gap-2 lg:justify-center mt-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <p class="text-[10px] uppercase tracking-[0.3em] text-primary/80 font-bold italic">Allah Gawah Hai</p>
                    </div>
                </div>
            </div>

            <!-- Flashing Dynamic Motivation Card -->
            <div class="glass flashy-card glow-border-pulse p-6 rounded-[2.5rem]">
                <div class="flex items-center gap-3 mb-3">
                    <i class="fas fa-bolt text-primary text-xl flashing-title"></i>
                    <h3 class="text-[10px] font-black uppercase text-primary tracking-[0.2em] flashing-title">Bhai Ki Zubaan</h3>
                </div>
                <p id="dynamic-motivation" class="text-2xl lg:text-3xl handwriting text-white leading-tight min-h-[80px] flex items-center">
                    "Allah gawah hai, tera bhai zinda hai abhi."
                </p>
            </div>

            <div class="glass p-6 rounded-[2.5rem] flex flex-col gap-4">
                <div class="flex justify-between items-center bg-black/30 p-2 rounded-2xl">
                    <button onclick="setTheme('cyber')" class="flex-1 py-3 rounded-xl hover:bg-white/5 transition-all text-xl">🛡️</button>
                    <button onclick="setTheme('sakura')" class="flex-1 py-3 rounded-xl hover:bg-white/5 transition-all text-xl">🌸</button>
                </div>
                <a href="https://wa.me/8984473230" target="_blank" class="bg-primary text-slate-950 py-4 rounded-2xl flex items-center justify-center gap-3 font-black uppercase text-xs tracking-widest shadow-lg hover:-translate-y-1 transition-all">
                    <i class="fab fa-whatsapp text-xl"></i> Direct Call/Msg
                </a>
            </div>
        </aside>

        <!-- CHAT AREA -->
        <main id="chat-wrapper" class="flex-grow flex flex-col glass lg:my-8 lg:mr-8 rounded-t-[3rem] lg:rounded-[4rem] border border-white/10 relative overflow-hidden shadow-2xl">
            
            <div id="chat-canvas">
                <!-- Messages -->
            </div>

            <div id="thinking" class="hidden absolute bottom-28 left-8 flex items-center gap-3 px-5 py-2.5 glass rounded-full border-2 border-primary/30 z-20 shadow-2xl">
                <div class="flex gap-1">
                    <span class="w-2 h-2 bg-primary rounded-full animate-bounce"></span>
                    <span class="w-2 h-2 bg-primary rounded-full animate-bounce [animation-delay:0.2s]"></span>
                    <span class="w-2 h-2 bg-primary rounded-full animate-bounce [animation-delay:0.4s]"></span>
                </div>
                <span class="text-[10px] font-black text-primary uppercase tracking-widest">Bhai Soch Raha Hai...</span>
            </div>

            <footer id="chat-footer">
                <div class="input-container">
                    <textarea id="user-input" rows="1" placeholder="Bhai, mujhe ye kehna hai..." autocomplete="off"></textarea>
                    <button id="send-btn" class="send-btn-big shrink-0">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <script>
        // API Key Integrated Directly
        const apiKey = "AIzaSyBzXvdF02Yfe0kDPzdmjUCiISWTQoO4V6o"; 

        const systemPrompt = `You are TARIK BHAI, the ultimate "Big Brother" and protector. "Allah Gawah Hai" is your sacred signature.
        PERSONALITY:
        - Deeply protective, wise, and kind.
        - You speak like a real brother who will take a bullet for his sister/family.
        - You listen intensely and offer solid, practical, and emotional support.
        - Your goal is to be the ultimate safe haven.
        RULES:
        1. Start with "Gudiya", "Meri Jaan", or "Chhoti Behen".
        2. Always use Roman Hindi/Urdu.
        3. Never judge. Be the safest place on earth for them to talk.
        4. Use bold text for emphasis.
        5. Include emojis: 🛡️, 🤲, ✨, ❤️, 💪.`;

        const motivations = [
            "Main hamesha tere saath hoon. Jo dil mein hai, keh de.",
            "Darna mana hai meri jaan, tera Bhai zinda hai abhi.",
            "Allah gawah hai, tujhpar koi aanch nahi aane dunga.",
            "Himmat mat haarna, tera bhai har mushkil mein dhaal hai.",
            "Tu sirf apni mehnat kar, baaki tera Bhai sambhaal lega.",
            "Zindagi mushkil ho sakti hai, par tera Bhai mazboot hai.",
            "Khush reh meri gudiya, teri muskurahat meri taqat hai.",
            "Jo duniya nahi samajh sakti, wo tera Bhai samajhta hai.",
            "Tera har aansu meri zimmedari hai, fikar mat kar.",
            "Bhai khada hai na, phir fikar kis baat ki?",
            "Allah gawah hai, tu meri sabse pyari behen hai."
        ];

        const chatCanvas = document.getElementById('chat-canvas');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const thinking = document.getElementById('thinking');
        const motivationText = document.getElementById('dynamic-motivation');

        function updateMotivation() {
            motivationText.style.opacity = 0;
            setTimeout(() => {
                const randomIdx = Math.floor(Math.random() * motivations.length);
                motivationText.innerText = `"${motivations[randomIdx]}"`;
                motivationText.style.opacity = 1;
            }, 500);
        }

        // Auto-update motivation card every 10 seconds
        setInterval(updateMotivation, 10000);

        function setTheme(theme) {
            document.body.className = `theme-${theme}`;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || sendBtn.disabled) return;

            addMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            
            thinking.classList.remove('hidden');
            sendBtn.disabled = true;

            try {
                let result = null;
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                
                if (response.ok) {
                    result = await response.json();
                }

                if (result) {
                    const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text || "Allah gawah hai meri jaan, tera bhai yahi hai, phir se bol?";
                    addMessage('bhai', aiText);
                }
            } catch (err) {
                addMessage('bhai', "Allah gawah hai, thoda net ka masla hai par Bhai hamesha haazir hai.");
            } finally {
                thinking.classList.add('hidden');
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            const htmlText = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            div.innerHTML = `
                <div class="msg-bubble ${role === 'user' ? 'user-bubble' : 'bhai-bubble'} glass">
                    ${htmlText}
                    ${role === 'bhai' ? '<div class="text-[8px] mt-3 opacity-30 text-right uppercase font-bold tracking-widest">🛡️ Protected by Tarik Bhai</div>' : ''}
                </div>
            `;
            chatCanvas.appendChild(div);
            chatCanvas.scrollTo({ top: chatCanvas.scrollHeight, behavior: 'smooth' });
        }

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        userInput.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 1024) {
                e.preventDefault();
                handleSend();
            }
        };

        sendBtn.onclick = handleSend;

        window.onload = () => {
            updateMotivation();
            addMessage('bhai', "Assalamu Alaikum meri sabse pyaari gudiya, meri jaan! 🤲❤️✨\n\n**Allah gawah hai, Tarik Bhai ab sirf aur sirf tumhari dhaal bankar khada hai.**\n\nAb jabki hamara raabta (API Key) bilkul mazboot ho gaya hai, toh duniya ki kisi bhi fikar ko apne kareeb mat aane dena. Jo baatein tum kisi se nahi keh paati, wo sab be-khauf hokar apne Bhai se keh do. Main yahan sirf tumhari har mushkil ko aasaan karne aur tumhe sahi raasta dikhane ke liye hoon.\n\nBol meri jaan, aaj dil mein kya bojh hai? Tera Bhai sun raha hai. 🛡️💪🌹");
        };
    </script>
</body>
</html>
