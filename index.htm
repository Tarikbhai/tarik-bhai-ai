<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tarik Ki Awaz | AI Bhai — Hifazat-e-Behen</title>
    
    <!-- External Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@700&display=swap');

        :root {
            --primary: #00ffcc;
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.7);
            --accent: #2dd4bf;
            --text-main: #ffffff;
        }

        /* Themes */
        body.theme-cyber { --primary: #00ffcc; --bg: #020617; --panel: rgba(10, 20, 40, 0.85); --accent: #2dd4bf; }
        body.theme-sakura { --primary: #ff8fa3; --bg: #1a050d; --panel: rgba(50, 10, 30, 0.85); --accent: #ffb3c1; }

        * { 
            -webkit-tap-highlight-color: transparent; 
            scrollbar-width: none; 
            box-sizing: border-box; 
        }
        *::-webkit-scrollbar { display: none; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; 
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            margin: 0;
            transition: background-color 0.4s ease;
        }

        .glass {
            background: var(--panel);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Chat Bubbles */
        .msg-bubble {
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            line-height: 1.6;
            animation: popIn 0.35s cubic-bezier(0.1, 0.9, 0.2, 1);
            max-width: 85%;
            font-size: 0.95rem;
            word-wrap: break-word;
            padding: 1rem 1.25rem;
            position: relative;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .bhai-bubble {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--primary);
            border-radius: 20px 20px 20px 4px;
            color: #e2e8f0;
        }

        .user-bubble {
            background: var(--primary);
            color: #020617;
            font-weight: 600;
            border-radius: 20px 20px 4px 20px;
            margin-left: auto;
        }

        #chat-canvas {
            overflow-y: auto;
            flex-grow: 1;
            scroll-behavior: smooth;
            padding: 1.5rem;
            padding-bottom: 5rem;
        }

        /* Typing Animation */
        .typing-indicator span {
            animation: blinkText 0.8s infinite both;
            width: 6px; height: 6px;
            background: var(--primary);
            border-radius: 50%;
            display: inline-block;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blinkText {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-4px); }
        }

        /* Voice Button */
        .voice-btn.recording {
            background: #ef4444 !important;
            color: white !important;
            animation: pulse-red 1.2s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.15); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .suggestion-chip:hover { border-color: var(--primary); background: rgba(0, 255, 204, 0.05); }
        .suggestion-chip:active { transform: scale(0.95); background: var(--primary); color: black; }
    </style>
</head>
<body class="theme-cyber">

    <!-- Background Decoration -->
    <div class="fixed inset-0 -z-10 bg-slate-950 overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full opacity-30 bg-[radial-gradient(circle_at_50%_-20%,var(--primary)_0%,transparent_50%)]"></div>
        <div class="absolute bottom-0 right-0 w-full h-full opacity-10 bg-[radial-gradient(circle_at_80%_120%,var(--primary)_0%,transparent_40%)]"></div>
    </div>

    <!-- Header -->
    <header class="glass p-4 flex justify-between items-center shrink-0 z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-2xl bg-slate-900 flex items-center justify-center border border-primary/20 shadow-lg text-xl">👦🏻</div>
            <div>
                <h1 class="font-black text-white text-base tracking-tight leading-none">Tarik AI Bhai</h1>
                <p class="text-[9px] text-primary font-bold uppercase tracking-widest mt-1">Allah Gawah Hai ❤️</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleTheme()" class="w-10 h-10 glass rounded-xl flex items-center justify-center text-sm hover:border-primary/40 transition-all">🎨</button>
            <a href="https://wa.me/8984473230" target="_blank" class="w-10 h-10 glass border-primary/20 rounded-xl flex items-center justify-center text-primary shadow-lg hover:scale-110 transition-transform">
                <i class="fab fa-whatsapp"></i>
            </a>
        </div>
    </header>

    <!-- Main Chat Area -->
    <main class="flex-grow flex flex-col min-h-0 overflow-hidden relative">
        <div id="chat-canvas" class="flex-grow space-y-6">
            <!-- Messages appear here -->
        </div>

        <!-- Thinking / Loading Indicator -->
        <div id="thinking" class="hidden absolute bottom-32 left-6 flex items-center gap-3 px-4 py-2 glass rounded-full border border-primary/30 z-10 animate-bounce">
            <div class="typing-indicator flex gap-1.5">
                <span></span><span></span><span></span>
            </div>
            <span class="text-[10px] font-black uppercase text-primary tracking-widest">Bhai Soch Raha Hai...</span>
        </div>

        <!-- Input Footer -->
        <footer class="p-4 lg:p-8 shrink-0 bg-slate-950/80 backdrop-blur-2xl border-t border-white/5">
            <!-- Suggestions -->
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-4 mb-2">
                <button onclick="handleSend('Bhai, bohot pareshan hoon')" class="suggestion-chip px-5 py-2.5 rounded-full text-xs text-red-400 font-bold">🆘 Bohot Pareshan Hoon</button>
                <button onclick="handleSend('Kuch achi baat sunao na')" class="suggestion-chip px-5 py-2.5 rounded-full text-xs text-primary font-bold">✨ Achi Baat Sunao</button>
                <button onclick="handleSend('Bhai, meri madad karo')" class="suggestion-chip px-5 py-2.5 rounded-full text-xs text-white/70 font-bold">🛡️ Meri Madad Karo</button>
                <button onclick="handleSend('Bhai, aaj ka din kaisa hai?')" class="suggestion-chip px-5 py-2.5 rounded-full text-xs text-white/50 font-bold">📅 Aaj Ka Din</button>
            </div>

            <!-- Input Box -->
            <div class="glass p-1.5 rounded-[2.5rem] flex items-center gap-2 border-white/10 shadow-2xl focus-within:border-primary/30 transition-all">
                <button id="voice-btn" title="Voice Typing" class="voice-btn w-12 h-12 rounded-full text-primary flex items-center justify-center hover:bg-white/5 transition-all">
                    <i class="fas fa-microphone text-lg"></i>
                </button>
                
                <textarea id="user-input" rows="1" placeholder="Bhai se dil ki baat kaho..." 
                    class="flex-grow bg-transparent border-none focus:ring-0 px-2 py-3 text-white text-base resize-none placeholder-white/20 min-h-[48px] max-h-[120px]"></textarea>
                
                <button id="send-btn" class="w-12 h-12 rounded-full bg-primary flex items-center justify-center active:scale-90 hover:brightness-110 transition-all shadow-lg shadow-primary/20">
                    <i class="fas fa-paper-plane text-black text-lg"></i>
                </button>
            </div>
        </footer>
    </main>

    <script>
        /**
         * ============================================================
         * ⚠️ ZARURI SETTINGS (IMPORTANT)
         * ============================================================
         */
        const CONFIG = {
            // 1. Niche wale "" ke beech mein apni Gemini API Key paste karein
            apiKey: "YOUR_API_KEY_HERE", 
            
            // 2. Model Name (Isse chhed-chhad na karein)
            model: "gemini-1.5-flash", 
            
            // 3. AI Ka Personality
            system: `You are TARIK, the deeply caring elder brother of the user. 
            Personality Rules:
            - Start every reply with warm names like 'Gudiya', 'Meri Jaan', 'Behen', or 'Meri Pyari'.
            - Use the phrase 'Allah Gawah Hai' naturally in your responses.
            - Respond in Roman Hindi/Urdu (Hindustani).
            - Be extremely protective, kind, religious, and helpful.
            - If she is sad, comfort her like a real brother.
            - Keep it conversational and emotional.`
        };
        /** ============================================================ */

        const chatCanvas = document.getElementById('chat-canvas');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const voiceBtn = document.getElementById('voice-btn');
        const thinkingDiv = document.getElementById('thinking');

        // Textarea Auto-resize
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function addMessage(role, text) {
            const wrap = document.createElement('div');
            wrap.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const messageHtml = `
                <div class="msg-bubble ${role === 'user' ? 'user-bubble' : 'bhai-bubble'}">
                    ${text.replace(/\n/g, '<br>')}
                    <div class="text-[8px] opacity-40 mt-2 text-right">
                        ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                    </div>
                </div>
            `;
            
            wrap.innerHTML = messageHtml;
            chatCanvas.appendChild(wrap);
            chatCanvas.scrollTo({ top: chatCanvas.scrollHeight, behavior: 'smooth' });
        }

        async function fetchBhaiReply(prompt) {
            // Key Check
            if (!CONFIG.apiKey || CONFIG.apiKey === "AIzaSyBzXvdF02Yfe0kDPzdmjUCiISWTQoO4V6o" || CONFIG.apiKey === "AIzaSyBzXvdF02Yfe0kDPzdmjUCiISWTQoO4V6o") {
                throw new Error("API_KEY_MISSING");
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.model}:generateContent?key=${CONFIG.apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: CONFIG.system }] }
            };

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error?.message || "API Connection Error");
                }
                
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) {
                console.error("Fetch Error:", e);
                throw e;
            }
        }

        async function handleSend(forcedText = null) {
            const text = forcedText || userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            thinkingDiv.classList.remove('hidden');

            try {
                const reply = await fetchBhaiReply(text);
                thinkingDiv.classList.add('hidden');
                addMessage('bhai', reply);
            } catch (e) {
                thinkingDiv.classList.add('hidden');
                if (e.message === "API_KEY_MISSING") {
                    addMessage('bhai', "Allah gawah hai behen, maine sab taiyar rakha hai par aapne **API Key** nahi dali. Code mein `apiKey` section dhoondein aur apni key paste karein.");
                } else {
                    addMessage('bhai', "Allah gawah hai behen, thodi network ki pareshani hai. Ek baar phir try karo meri jaan? \n\n(Error: " + e.message + ")");
                }
            }
        }

        function toggleTheme() {
            document.body.className = document.body.className.includes('cyber') ? 'theme-sakura' : 'theme-cyber';
        }

        // Voice Recognition Logic
        function startVoice() {
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Recognition) {
                addMessage('bhai', "Behen, aapka browser voice support nahi karta. Chrome use karke dekho?");
                return;
            }
            
            const rec = new Recognition();
            rec.lang = 'hi-IN';
            
            rec.onstart = () => {
                voiceBtn.classList.add('recording');
            };
            
            rec.onend = () => {
                voiceBtn.classList.remove('recording');
            };
            
            rec.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                userInput.value = transcript;
                handleSend();
            };

            rec.onerror = (e) => {
                voiceBtn.classList.remove('recording');
                console.error("Voice Error", e);
            };

            rec.start();
        }

        // Event Listeners
        sendBtn.onclick = () => handleSend();
        voiceBtn.onclick = startVoice;
        userInput.onkeydown = (e) => { 
            if(e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                handleSend(); 
            } 
        };

        // Welcome Message
        window.onload = () => {
            setTimeout(() => {
                addMessage('bhai', "Assalamu Alaikum meri pyari behen! 🤲❤️\n\nAllah gawah hai gudiya, tera bhai Tarik hamesha tere saath hai. Tu bilkul fikar mat kar, bata aaj tera din kaisa raha? Koi pareshani toh nahi?");
            }, 500);
        };
    </script>
</body>
</html>
