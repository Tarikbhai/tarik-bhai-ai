<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tarik Ki Awaz | AI Bhai — Hifazat-e-Behen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@700&display=swap');

        :root {
            --primary: #00ffcc;
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.7);
            --accent: #2dd4bf;
            --text-main: #ffffff;
        }

        body.theme-cyber { --primary: #00ffcc; --bg: #020617; --panel: rgba(10, 20, 40, 0.85); --accent: #2dd4bf; }
        body.theme-sakura { --primary: #ff8fa3; --bg: #1a050d; --panel: rgba(50, 10, 30, 0.85); --accent: #ffb3c1; }

        * { -webkit-tap-highlight-color: transparent; scrollbar-width: none; box-sizing: border-box; }
        *::-webkit-scrollbar { display: none; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; 
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            margin: 0;
            transition: background-color 0.4s ease;
        }

        .glass {
            background: var(--panel);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .msg-bubble {
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            line-height: 1.5;
            animation: popIn 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            max-width: 85%;
            font-size: 1rem;
            word-wrap: break-word;
            padding: 0.9rem 1.1rem;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .bhai-bubble {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--primary);
            border-radius: 18px 18px 18px 4px;
            color: #e2e8f0;
        }

        .user-bubble {
            background: var(--primary);
            color: #020617;
            font-weight: 700;
            border-radius: 18px 18px 4px 18px;
        }

        #chat-canvas {
            overflow-y: auto;
            flex-grow: 1;
            scroll-behavior: smooth;
            padding-bottom: 4rem;
        }

        .typing-indicator span {
            animation: blinkText 0.8s infinite both;
            width: 5px; height: 5px;
            background: var(--primary);
            border-radius: 50%;
            display: inline-block;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blinkText {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-3px); }
        }

        .voice-btn.recording {
            background: #ef4444 !important;
            animation: pulse-red 1s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.2s;
            flex-shrink: 0;
            cursor: pointer;
        }
        .suggestion-chip:active { background: var(--primary); color: black; }
    </style>
</head>
<body class="theme-cyber">

    <div class="fixed inset-0 -z-10 bg-slate-950 overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full opacity-30 bg-[radial-gradient(circle_at_50%_-20%,#00ffcc_0%,transparent_50%)]"></div>
        <div class="absolute bottom-0 right-0 w-full h-full opacity-20 bg-[radial-gradient(circle_at_80%_120%,#00ffcc_0%,transparent_40%)]"></div>
    </div>

    <!-- Header -->
    <header class="glass p-4 flex justify-between items-center shrink-0 z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center border border-primary/20 shadow-lg">👦🏻</div>
            <div>
                <h1 class="font-black text-white text-sm tracking-tight">Tarik AI Bhai</h1>
                <p class="text-[8px] text-primary font-bold uppercase tracking-widest">Allah Gawah Hai ❤️</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleTheme()" class="w-10 h-10 glass rounded-xl flex items-center justify-center text-xs">🎨</button>
            <a href="https://wa.me/8984473230" class="w-10 h-10 glass border-primary/30 rounded-xl flex items-center justify-center text-primary shadow-lg"><i class="fab fa-whatsapp"></i></a>
        </div>
    </header>

    <main class="flex-grow flex flex-col min-h-0 overflow-hidden relative">
        <div id="chat-canvas" class="flex-grow px-4 py-4 space-y-5"></div>

        <!-- Thinking Indicator -->
        <div id="thinking" class="hidden absolute bottom-28 left-6 flex items-center gap-2 px-3 py-1.5 glass rounded-full border border-primary/30 z-10 scale-90 origin-left">
            <div class="typing-indicator flex gap-1">
                <span></span><span></span><span></span>
            </div>
            <span class="text-[9px] font-black uppercase text-primary tracking-tighter">Bhai Soch Raha Hai...</span>
        </div>

        <footer class="p-3 lg:p-6 shrink-0 bg-slate-950/50 backdrop-blur-xl">
            <!-- Quick Chips -->
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-3 mb-1">
                <button onclick="handleSend('Bhai, bohot pareshan hoon')" class="suggestion-chip px-4 py-2 rounded-full text-[10px] text-red-400 border-red-500/20 font-bold">🆘 Bohot Pareshan Hoon</button>
                <button onclick="handleSend('Kuch achi baat sunao na')" class="suggestion-chip px-4 py-2 rounded-full text-[10px] text-primary font-bold">✨ Achi Baat Sunao</button>
                <button onclick="handleSend('Bhai, meri madad karo')" class="suggestion-chip px-4 py-2 rounded-full text-[10px] text-white/70 font-bold">🛡️ Meri Madad Karo</button>
            </div>

            <div class="glass p-1 rounded-[2rem] flex items-center gap-1 border-white/5 shadow-2xl">
                <button id="voice-btn" class="w-11 h-11 rounded-full text-primary flex items-center justify-center hover:bg-white/5 transition-colors"><i class="fas fa-microphone"></i></button>
                <textarea id="user-input" rows="1" placeholder="Bhai se dil ki baat kaho..." class="flex-grow bg-transparent border-none focus:ring-0 px-2 py-3 text-white text-sm resize-none placeholder-white/20"></textarea>
                <button id="send-btn" class="w-11 h-11 rounded-full bg-primary flex items-center justify-center active:scale-90 transition-transform shadow-lg shadow-primary/20"><i class="fas fa-paper-plane text-black text-sm"></i></button>
            </div>
        </footer>
    </main>

    <script>
        // API Configuration - Optimized to avoid re-declaration errors
        const CONFIG = {
            API_KEY: "", 
            MODEL: "gemini-2.5-flash-preview-09-2025",
            SYSTEM: "You are TARIK, the deeply caring elder brother. Start every reply with warm names like 'Gudiya', 'Meri Jaan', or 'Behen'. Use 'Allah Gawah Hai' often to show your sincerity and protection. You are the shield for every girl. Respond in a mix of Roman Hindi/Urdu and English. If she is scared or sad, offer immediate comfort and strength."
        };
        
        const chatCanvas = document.getElementById('chat-canvas');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const voiceBtn = document.getElementById('voice-btn');
        const thinkingDiv = document.getElementById('thinking');

        function addMessage(role, text) {
            const wrap = document.createElement('div');
            wrap.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            wrap.innerHTML = `<div class="msg-bubble ${role === 'user' ? 'user-bubble' : 'bhai-bubble'}">${text.replace(/\n/g, '<br>')}</div>`;
            chatCanvas.appendChild(wrap);
            chatCanvas.scrollTo({ top: chatCanvas.scrollHeight, behavior: 'smooth' });
        }

        async function fetchBhaiReply(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.MODEL}:generateContent?key=${CONFIG.API_KEY}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: CONFIG.SYSTEM }] }
            };

            for (let i = 0; i < 3; i++) {
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    }
                } catch (e) {
                    console.error("Attempt " + (i+1) + " failed");
                }
                await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i))); 
            }
            throw new Error("Bhai is thinking deep");
        }

        async function handleSend(forcedText = null) {
            const text = forcedText || userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            thinkingDiv.classList.remove('hidden');

            try {
                const reply = await fetchBhaiReply(text);
                thinkingDiv.classList.add('hidden');
                addMessage('bhai', reply || "Gudiya, bhai ko samajh nahi aaya, ek baar phir koshish karogi?");
            } catch (e) {
                thinkingDiv.classList.add('hidden');
                addMessage('bhai', "Allah gawah hai behen, network ki wajah se rukawat aayi hai, par tera bhai tere paas hi hai. Phir se kaho?");
            }
        }

        function toggleTheme() {
            document.body.className = document.body.className.includes('cyber') ? 'theme-sakura' : 'theme-cyber';
        }

        function startVoice() {
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Recognition) return;
            const rec = new Recognition();
            rec.lang = 'hi-IN';
            rec.onstart = () => voiceBtn.classList.add('recording');
            rec.onend = () => voiceBtn.classList.remove('recording');
            rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; handleSend(); };
            rec.start();
        }

        sendBtn.onclick = () => handleSend();
        voiceBtn.onclick = startVoice;
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
        userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };

        window.onload = () => {
            const welcome = `Assalamu Alaikum meri pyari behen! 🤲❤️\n\nAllah gawah hai gudiya, tera bhai Tarik hamesha tere saath hai. Tumhe kabhi bhi darr lage ya koi baat karni ho, bas mujhse keh dena. Bolo meri jaan, kya baat hai?`;
            addMessage('bhai', welcome);
        };
    </script>
</body>
</html>
